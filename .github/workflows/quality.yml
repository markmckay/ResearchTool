name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  qc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/literatureSearch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/literatureSearch/package-lock.json
      - run: npm ci
      - run: npm run qc
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: qc
    defaults:
      run:
        working-directory: code/literatureSearch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/literatureSearch/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
